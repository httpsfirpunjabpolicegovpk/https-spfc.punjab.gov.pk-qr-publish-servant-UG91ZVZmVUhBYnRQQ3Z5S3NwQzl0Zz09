<script>
    let captchaResult;

    // Function to generate and display a new captcha
    function refreshCaptcha() {
        let num1 = Math.floor(Math.random() * 20) + 1;
        let num2 = Math.floor(Math.random() * 10) + 1;
        captchaResult = num1 + num2;
        
        document.getElementById('captcha-ques').innerText = num1 + " + " + num2 + " =";
        document.getElementById('captcha_ans').value = ""; // Clear input field
    }

    $(document).ready(function(){
        // Apply CNIC mask
        $('.cnic2').mask('00000-0000000-0');
        
        // Generate initial captcha on load
        refreshCaptcha();

        // Form submission logic with English warnings
        $('#frm_submit').on('submit', function(e) {
            let userAnswer = document.getElementById('captcha_ans').value;
            
            if (userAnswer === "") {
                e.preventDefault();
                alert("Please enter the captcha result.");
            } 
            else if (parseInt(userAnswer) !== captchaResult) {
                e.preventDefault(); 
                alert("Invalid Captcha! Please try again.");
                refreshCaptcha();
            } 
            else {
                alert("Verification successful! Submitting document...");
            }
        });
    });
</script>
